version: '3.8'

# ── SecureOps Full Stack - Local Development ─────────────────────────────
# Usage:  docker-compose up -d
# App:    http://localhost:5000
# Grafana: http://localhost:3000  (admin/admin)
# Prometheus: http://localhost:9090
# SonarQube: http://localhost:9000

services:

  # ── Your Python Application ────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: secureops-app
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=1.0.0
      - APP_ENV=development
      - PORT=5000
    restart: unless-stopped
    networks:
      - secureops-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=5000"
      - "prometheus.path=/metrics"

  # ── NGINX Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: secureops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - secureops-net
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: secureops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - secureops-net
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: secureops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=SecureOps2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - secureops-net
    restart: unless-stopped

  # ── SonarQube ──────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:community
    container_name: secureops-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar2024
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      - sonar-db
    networks:
      - secureops-net
    restart: unless-stopped

  sonar-db:
    image: postgres:15-alpine
    container_name: secureops-sonar-db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar2024
      - POSTGRES_DB=sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    networks:
      - secureops-net
    restart: unless-stopped

# ── Networks & Volumes ──────────────────────────────────────────────────────
networks:
  secureops-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  sonarqube-data:
  sonarqube-extensions:
  sonar-db-data:
